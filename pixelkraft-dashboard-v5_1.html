<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixelkraft — Dashboard</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=inter:400,500,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ================================================================
   PIXELKRAFT DESIGN SYSTEM — Based on Flux UI (fluxui.dev)
   Tailwind zinc palette, dark mode, Inter font
   ================================================================ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Zinc palette (Tailwind defaults) ── */
:root {
  --zinc-50:  #fafafa;
  --zinc-100: #f4f4f5;
  --zinc-200: #e4e4e7;
  --zinc-300: #d4d4d8;
  --zinc-400: #a1a1aa;
  --zinc-500: #71717a;
  --zinc-600: #52525b;
  --zinc-700: #3f3f46;
  --zinc-800: #27272a;
  --zinc-900: #18181b;
  --zinc-950: #09090b;

  /* Accent: emerald-based green */
  --accent: #34d399;
  --accent-content: #34d399;
  --accent-fg: #000;

  /* Semantic */
  --red: #ef4444;
  --orange: #f97316;
  --amber: #f59e0b;
  --warn: #f59e0b;
  --green: #22c55e;
  --blue: #3b82f6;
  --violet: #8b5cf6;
  --purple: #8b5cf6;

  /* Dim (15% opacity variants for badges) */
  --accent-dim: rgba(52,211,153,0.15);
  --warn-dim: rgba(245,158,11,0.15);
  --red-dim: rgba(239,68,68,0.15);
  --blue-dim: rgba(59,130,246,0.15);
  --orange-dim: rgba(249,115,22,0.15);
  --purple-dim: rgba(139,92,246,0.15);

  /* Text alias */
  --text: #fff;

  /* Mono font */
  --mono: 'IBM Plex Mono', ui-monospace, monospace;
}

/* ── Dark mode tokens (Flux pattern: zinc-800 body, zinc-900 sidebar, white/N borders) ── */
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--zinc-800);
  color: #fff;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

/* ================================================================
   SIDEBAR — bg-zinc-900, border-r border-zinc-700
   ================================================================ */
.sidebar {
  background: var(--zinc-900);
  border-right: 1px solid var(--zinc-700);
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 0; }

.sb-logo {
  font-weight: 600;
  font-size: 15px;
  padding: 4px 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #fff;
}
.logo-mark {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), #06b6d4);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #000;
}

/* Section labels */
.sb-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--zinc-400);
  padding: 16px 16px 6px;
}

/* Nav items — Flux sidebar.item pattern:
   rounded-lg, px-3 py-2, hover:bg-white/5, current:bg-white/10 */
.sb-link {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px;
  margin: 1px 8px;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.1s, color 0.1s;
}
.sb-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
.sb-link.active { color: #fff; background: rgba(255,255,255,0.1); font-weight: 500; }
.sb-link svg { width: 16px; height: 16px; opacity: 0.5; flex-shrink: 0; }
.sb-link.active svg { opacity: 0.85; }

/* Project items (indented) */
.sb-site {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px;
  margin: 1px 8px 1px 22px;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.1s, color 0.1s;
}
.sb-site:hover { color: #fff; background: rgba(255,255,255,0.05); }
.sb-site.active { color: #fff; background: rgba(255,255,255,0.1); }

/* Status dots */
.sb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sb-dot-green { background: var(--accent); }
.sb-dot-red { background: var(--red); }
.sb-dot-yellow { background: var(--amber); }

/* Sub-nav (collapsible) */
.sb-sub { overflow: hidden; max-height: 0; transition: max-height 0.2s ease; }
.sb-sub.open { max-height: 300px; }

.sb-sub-link {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px;
  margin: 1px 8px 1px 42px;
  font-size: 13px;
  color: var(--zinc-400);
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.1s, color 0.1s;
}
.sb-sub-link:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
.sb-sub-link.active { color: #fff; background: rgba(255,255,255,0.1); }
.sb-sub-link svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }
.sb-sub-link.active svg { opacity: 0.7; }

/* Badge in sidebar */
.sb-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  background: rgba(255,255,255,0.1);
  color: var(--zinc-400);
  padding: 1px 7px;
  border-radius: 6px;
  margin-left: auto;
}
.sb-sub-link.active .sb-badge {
  background: rgba(52,211,153,0.15);
  color: var(--accent);
}

/* Separator */
.sb-div { height: 1px; background: var(--zinc-700); margin: 8px 16px; }

/* User block */
.sb-user {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--zinc-700);
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0;
}

/* ================================================================
   MAIN CONTENT AREA — bg-zinc-800 (same as body)
   ================================================================ */
.main { padding: 28px 36px; }

.view { display: none; animation: fadeUp 0.15s ease; }
.view.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

/* Page header */
.page-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.page-title { font-size: 18px; font-weight: 600; color: #fff; }
.page-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* Back link */
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--zinc-400);
  cursor: pointer; margin-bottom: 16px; transition: color 0.1s;
}
.back-link:hover { color: #fff; }

/* Detail head */
.detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.detail-head h2 { font-size: 18px; font-weight: 600; color: #fff; }

/* Welcome */
.welcome-greeting { font-size: 18px; font-weight: 600; color: #fff; }
.welcome-date { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* ================================================================
   BUTTONS — Flux button variants
   Default (outline): border-white/10, bg transparent, text white
   Primary: bg-accent, text black
   Ghost: no border, text zinc-400
   ================================================================ */
.btn {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all 0.1s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.15); }
.btn-accent { background: var(--accent); color: #000; border-color: transparent; font-weight: 600; }
.btn-accent:hover { background: #2dd4a0; color: #000; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--zinc-400); }
.btn-ghost:hover { color: #fff; background: rgba(255,255,255,0.05); }

/* ================================================================
   STAT CARDS — Flux card pattern: bg-white/10, border-white/10, rounded-xl
   ================================================================ */
.stats {
  display: grid;
  gap: 1px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}
.stats-2 { grid-template-columns: repeat(2, 1fr); }
.stats-3 { grid-template-columns: repeat(3, 1fr); }
.stats-4 { grid-template-columns: repeat(4, 1fr); }

.stat {
  background: var(--zinc-800);
  padding: 16px 18px;
}
.stat-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--zinc-400);
  margin-bottom: 6px;
}
.stat-val {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  color: #fff;
}
.stat-val-sm {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: #fff;
}
.stat-note { font-size: 11px; color: var(--zinc-500); margin-top: 4px; }

/* ================================================================
   BADGES / PILLS — Flux badge: rounded-md, font-medium, subtle bg
   Color pattern in dark: bg-{color}/10, text-{color}-400
   ================================================================ */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 6px;
  line-height: 1.4;
}
.pill-green  { background: rgba(52,211,153,0.15);  color: var(--accent); }
.pill-yellow { background: rgba(245,158,11,0.15);  color: var(--amber); }
.pill-blue   { background: rgba(59,130,246,0.15);  color: var(--blue); }
.pill-purple { background: rgba(139,92,246,0.15);  color: var(--violet); }
.pill-red    { background: rgba(239,68,68,0.15);   color: var(--red); }
.pill-orange { background: rgba(249,115,22,0.15);  color: var(--orange); }
.pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.pill-no-dot::before { display: none; }

.tag {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 6px;
  background: rgba(255,255,255,0.1);
  color: var(--zinc-400);
}

/* ================================================================
   TABLES — Flux table: border-white/10, no uppercase headers
   ================================================================ */
.table-wrap {
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  font-size: 13px;
  font-weight: 500;
  color: var(--zinc-400);
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
td {
  padding: 10px 16px;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  border-top: 1px solid rgba(255,255,255,0.05);
}
tbody tr:first-child td { border-top: none; }
tr.clickable { cursor: pointer; transition: background 0.08s; }
tr.clickable:hover td { background: rgba(255,255,255,0.03); }

.site-name { font-weight: 500; display: flex; align-items: center; gap: 10px; color: #fff; }
.site-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.site-dot-live { background: var(--accent); }

/* ================================================================
   SECTIONS, LISTS
   ================================================================ */
.section { margin-bottom: 24px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 14px; font-weight: 600; color: #fff; }

/* Deploy list */
.deploy-list { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
.deploy-item {
  display: grid; grid-template-columns: 80px 90px 60px 1fr auto;
  align-items: center; gap: 12px; padding: 10px 16px; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.08s;
}
.deploy-item:last-child { border-bottom: none; }
.deploy-item:hover { background: rgba(255,255,255,0.03); }
.deploy-hash { font-family: var(--mono); font-size: 12px; color: var(--zinc-400); }
.deploy-dur  { font-family: var(--mono); font-size: 12px; color: var(--zinc-500); }
.deploy-time { font-size: 12px; color: var(--zinc-500); text-align: right; }

/* ================================================================
   TABS — Flux tabs: border-b, text-sm, current has accent underline
   ================================================================ */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
.tab {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 8px 16px;
  color: var(--zinc-400);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.1s;
}
.tab:hover { color: rgba(255,255,255,0.7); }
.tab.active { color: #fff; border-bottom-color: #fff; }
.badge-count {
  font-family: var(--mono);
  font-size: 10px;
  background: rgba(255,255,255,0.1);
  color: var(--zinc-400);
  padding: 1px 6px;
  border-radius: 6px;
  margin-left: 6px;
}

/* ================================================================
   PANELS (analytics split)
   ================================================================ */
.panels {
  display: grid; grid-template-columns: 1.5fr 1fr;
  gap: 1px; background: rgba(255,255,255,0.1);
  border-radius: 12px; overflow: hidden; margin-bottom: 20px;
}
.panel { background: var(--zinc-800); padding: 18px; }
.panel-title {
  font-size: 12px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--zinc-400); margin-bottom: 14px;
}
.speed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.speed-item-label { font-size: 11px; color: var(--zinc-500); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
.speed-item-val { font-family: var(--mono); font-size: 16px; font-weight: 500; color: #fff; }

.traffic-placeholder { height: 160px; display: flex; align-items: flex-end; gap: 3px; padding: 0 4px; opacity: 0.15; }
.traffic-bar { flex: 1; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 6px; }

/* ================================================================
   EMPTY STATE
   ================================================================ */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 16px; color: var(--zinc-500); font-size: 13px; gap: 4px;
}
.empty-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
}
.empty-icon svg { width: 16px; height: 16px; opacity: 0.4; }

/* ================================================================
   INBOX THREADS
   ================================================================ */
.thread-list { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
.thread {
  display: grid; grid-template-columns: 1fr auto; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer; transition: background 0.08s;
}
.thread:last-child { border-bottom: none; }
.thread:hover { background: rgba(255,255,255,0.03); }
.thread-from { font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 1px; display: flex; align-items: center; gap: 8px; }
.thread-subject { font-size: 14px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thread-preview { font-size: 13px; color: var(--zinc-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.thread-time { font-size: 12px; color: var(--zinc-500); white-space: nowrap; }
.thread-unread .thread-from { color: #fff; }
.thread-unread { background: rgba(255,255,255,0.03); }
.unread-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* ================================================================
   REMINDERS
   ================================================================ */
.reminder-list { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
.reminder {
  display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; transition: background 0.08s;
}
.reminder:last-child { border-bottom: none; }
.reminder:hover { background: rgba(255,255,255,0.03); }
.reminder-check {
  width: 16px; height: 16px; border-radius: 5px;
  border: 1.5px solid var(--zinc-600); cursor: pointer;
  transition: all 0.1s; display: flex; align-items: center; justify-content: center;
}
.reminder-check:hover { border-color: var(--accent); }
.reminder-check.done { background: var(--accent); border-color: var(--accent); }
.reminder-check.done::after { content: '✓'; font-size: 10px; color: #000; font-weight: 700; }
.reminder-text { font-size: 14px; color: rgba(255,255,255,0.7); }
.reminder-text.done-text { text-decoration: line-through; color: var(--zinc-500); }
.reminder-due { font-size: 12px; color: var(--zinc-500); font-family: var(--mono); }
.reminder-due.overdue { color: var(--red); }

/* ================================================================
   EXPENSES
   ================================================================ */
.expense-list { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
.expense-row {
  display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 16px;
  padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px;
}
.expense-row:last-child { border-bottom: none; }
.expense-row:hover { background: rgba(255,255,255,0.03); }
.expense-desc { font-weight: 500; color: rgba(255,255,255,0.7); }
.expense-cat { font-size: 12px; color: var(--zinc-500); }
.expense-amt { font-family: var(--mono); font-size: 14px; font-weight: 500; color: #fff; }
.expense-date { font-size: 12px; color: var(--zinc-500); font-family: var(--mono); }

/* ================================================================
   REPORTS
   ================================================================ */
.report-card {
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  overflow: hidden; margin-bottom: 8px; transition: background 0.08s; cursor: pointer;
}
.report-card:hover { background: rgba(255,255,255,0.03); }
.report-card-inner { padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
.report-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.report-icon svg { width: 16px; height: 16px; opacity: 0.5; }
.report-title { font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 1px; }
.report-meta { font-size: 13px; color: var(--zinc-500); }
.report-status { margin-left: auto; }

/* ================================================================
   FORMS — Flux input: bg transparent, border-white/10, focus:accent ring
   ================================================================ */
.form-field { margin-bottom: 18px; }
.form-label { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); display: block; margin-bottom: 6px; }
.form-label span { color: var(--zinc-500); font-weight: 400; }
.form-input {
  width: 100%; padding: 8px 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
  -webkit-appearance: none;
}
.form-input::placeholder { color: var(--zinc-500); }
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
select.form-input {
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2371717a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
  background-color: transparent;
}
select.form-input option { background: var(--zinc-900); color: #fff; }
.form-hint { font-size: 13px; color: var(--zinc-500); margin-top: 5px; }

/* ================================================================
   DASHBOARD CARDS — Flux card: bg-white/10, border-white/10, rounded-xl, p-6
   ================================================================ */
.dash-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 16px 18px;
}
.dash-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.dash-card-title { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); }
.dash-card-title svg { opacity: 0.5; }

/* Issue items */

.health-item:last-child { border-bottom: none; }
.health-item:hover { background: rgba(255,255,255,0.03); }

function pr(s){return s.reminders.filter(r=>!r.done).length}

function totalPending(){return SITES.reduce((a,s)=>a+pr(s),0)}
function totalIssues(){
  let c=0;
  SITES.forEach(s=>{if(!s.sslOk)c++;if(!s.isUp)c++;c+=s.seoIssues.filter(i=>i.severity==='warn').length;});

}

function go(v){

  renderSidebar();renderMain();
}

function renderMain(){
  const el=document.getElementById('main');

  if(currentView==='sites'){el.innerHTML=vSites();return}
  if(currentView==='add-site'){el.innerHTML=vAddSite();return}
  const parts=currentView.split('-');const section=parts[0];const sid=parts.slice(1).join('-');
  const s=SITES.find(x=>x.id===sid);
  if(!s){el.innerHTML='<div class="empty">Not found</div>';return}
  const views={detail:vDetail,inbox:vInbox,reports:vReports,expenses:vExpenses,reminders:vReminders,analytics:vAnalytics};
  el.innerHTML=(views[section]||vDetail)(s);
}

/* ═══════════════ DASHBOARD ═══════════════ */
function vDashboard(){
  const now=new Date();
  const greeting=now.getHours()<12?'Good morning':now.getHours()<18?'Good afternoon':'Good evening';
  const dateStr=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const allUp=SITES.every(s=>s.isUp);
  const totalPages=SITES.reduce((a,s)=>a+s.pages,0);
  const avgUptime=(SITES.reduce((a,s)=>a+s.uptime,0)/SITES.length).toFixed(2);
  const totalExpenses=SITES.reduce((a,s)=>a+s.expenses.reduce((b,e)=>b+parseFloat(e.amount.replace('€','')),0),0).toFixed(2);
  const pendingReports=SITES.reduce((a,s)=>a+s.reports.filter(r=>r.status==='Draft').length,0);
  const totalErrors=SITES.reduce((a,s)=>a+s.errors.length,0);
  const totalSeo=SITES.reduce((a,s)=>a+s.seoIssues.length,0);

  // Issues
  let issues=[];
  SITES.forEach(s=>{
    if(!s.sslOk) issues.push({icon:'shield',color:'yellow',text:`SSL pending on <strong>${s.name}</strong>`,meta:'Certificate not yet provisioned',site:s.id});
    if(!s.isUp) issues.push({icon:'alert',color:'red',text:`<strong>${s.name}</strong> is down`,meta:'Site unreachable',site:s.id});
    s.errors.forEach(e=>issues.push({icon:'alert',color:'red',text:e.text,meta:`${s.name} · ${e.time}`,site:s.id}));
    s.reminders.filter(r=>r.overdue&&!r.done).forEach(r=>issues.push({icon:'clock',color:'red',text:`Overdue: ${r.text}`,meta:`${s.name} · Due ${r.due}`,site:s.id}));
  });

  // Activity
  let activity=[];
  SITES.forEach(s=>{
    s.deploys.forEach(d=>activity.push({color:d.status==='Success'?'var(--accent)':'var(--red)',text:`Deployed <strong>${s.name}</strong> — ${d.hash}`,time:d.time}));
    s.inbox.filter(m=>m.unread).forEach(m=>activity.push({color:'var(--blue)',text:`New message from <strong>${m.from}</strong>`,time:m.time}));
  });

  // SEO
  let seoItems=[];
  SITES.forEach(s=>{s.seoIssues.forEach(i=>{
    seoItems.push({site:s.name,page:i.page,issue:i.issue,pillClass:i.severity==='warn'?'pill-orange':'pill-blue',label:i.severity==='warn'?'Warning':'Info',siteId:s.id});
  });});

  return `

        <div class="welcome-greeting">${greeting}, Agon</div>
        <div class="welcome-date">${dateStr}</div>
      </div>
      <button class="btn btn-sm" onclick="go('sites')">View all sites</button>
    </div>

    <!-- Top stats -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;margin-bottom:24px">
      <div class="stat">
        <div class="stat-label">Sites</div>
        <div class="stat-val">${SITES.length}</div>
        <div class="stat-note">${allUp?'<span style="color:var(--accent)">All online</span>':'<span style="color:var(--red)">Issues</span>'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Uptime</div>
        <div class="stat-val">${avgUptime}<span style="font-size:13px;color:var(--zinc-500)">%</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Pages</div>
        <div class="stat-val">${totalPages}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Messages</div>
        <div class="stat-val">${totalUnread()}</div>
        <div class="stat-note">${totalUnread()?'<span style="color:var(--blue)">Unread</span>':'All read'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Errors</div>
        <div class="stat-val" style="${totalErrors?'color:var(--red)':''}">${totalErrors}</div>
        <div class="stat-note">${totalErrors?'Needs attention':'All clear'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">SEO issues</div>
        <div class="stat-val" style="${totalSeo?'color:var(--orange)':''}">${totalSeo}</div>
      </div>
    </div>

    <!-- Issues + Activity row -->
    <div style="display:grid;grid-template-columns:${issues.length?'1.3fr 1fr':'1fr'};gap:16px;margin-bottom:20px">
      ${issues.length?`<div class="dash-card">
        <div class="dash-card-head"><div class="dash-card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Action needed</div><span style="font-size:11px;color:var(--zinc-500)">${issues.length} items</span></div>
        ${issues.slice(0,5).map(i=>{
          const cm={red:'issue-icon-red',yellow:'issue-icon-yellow',blue:'issue-icon-blue',green:'issue-icon-green',orange:'issue-icon-yellow'};
          return `<div class="issue-item" style="cursor:pointer" onclick="go('detail-${i.site}')">
            <div class="issue-icon ${cm[i.color]}">${I[i.icon]}</div>
            <div><div class="issue-text">${i.text}</div><div class="issue-meta">${i.meta}</div></div>
          </div>`;
        }).join('')}
      </div>`:''}
      <div class="dash-card">
        <div class="dash-card-head"><div class="dash-card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Recent activity</div></div>
        ${activity.length?activity.slice(0,6).map(a=>`
          <div class="activity-item">
            <div class="activity-dot" style="background:${a.color}"></div>
            <div><div class="activity-text">${a.text}</div><div class="activity-time">${a.time}</div></div>
          </div>`).join(''):'<div style="color:var(--zinc-500);font-size:13px;padding:12px 0">No recent activity</div>'}
      </div>
    </div>

    <!-- Site health full width -->
    <div class="dash-card" style="margin-bottom:20px">
      <div class="dash-card-head"><div class="dash-card-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg> Site health</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Site</th><th>Status</th><th>SSL</th><th>Uptime</th><th>Response</th><th>Pages</th><th>Errors</th><th>SEO</th></tr></thead>
          <tbody>
          ${SITES.map(s=>{
            const stPill=s.isUp?'<span class="pill pill-green" style="font-size:10px">Online</span>':'<span class="pill pill-red" style="font-size:10px">Down</span>';
            const slPill=s.sslOk?'<span class="pill pill-green pill-no-dot" style="font-size:10px">OK</span>':'<span class="pill pill-yellow pill-no-dot" style="font-size:10px">Pending</span>';
            return `<tr class="clickable" onclick="go('detail-${s.id}')">
              <td><span class="site-name"><span class="site-dot ${s.isUp?'site-dot-live':''}" style="${s.isUp?'':'background:var(--red)'}"></span>${s.name}<span style="font-weight:400;color:var(--zinc-500);font-size:12px;margin-left:6px">${s.client}</span></span></td>
              <td>${stPill}</td>

/* ═══════════════ SITE DETAIL ═══════════════ */
function vDetail(s){
  const sslPill=s.sslOk?'<span class="pill pill-green">Active</span>':'<span class="pill pill-yellow">Pending</span>';
  const deploys=s.deploys.map(d=>`<div class="deploy-item">
    <span class="pill pill-green" style="font-size:10px;width:fit-content">Success</span>
    <span class="deploy-hash">${d.hash}</span><span class="deploy-dur">${d.dur}</span>
    <span class="deploy-time">${d.time}</span>
    <div style="display:flex;gap:8px"><button class="btn-ghost btn btn-sm">Log</button><button class="btn-ghost btn btn-sm">Rollback</button></div></div>`).join('');
  let pagesContent;
  if(!s.pageList.length){
    pagesContent=`<div class="empty"><div class="empty-icon">${I.file}</div>No pages discovered yet<span style="font-size:12px">Pages appear after sync</span></div>`;

    pagesContent=`<div class="table-wrap"><table><thead><tr><th>Page</th><th>URL</th><th>SEO</th><th style="text-align:right">Visitors</th><th>Status</th><th style="text-align:right"></th></tr></thead><tbody>
      ${s.pageList.map(p=>{
        const seoColor=p.seo>=90?'var(--accent)':p.seo>=80?'var(--warn)':'var(--red)';
        const seoBg=p.seo>=90?'var(--accent-dim)':p.seo>=80?'var(--warn-dim)':'var(--red-dim)';
        const statusPill=p.status==='Published'?'pill-green':'pill-yellow';
        return `<tr>
          <td style="font-weight:500;max-width:200px"><div style="display:flex;align-items:center;gap:8px">${p.changed?'<span style="width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0" title="Content changed"></span>':''}${p.title}</div></td>
          <td style="font-family:var(--mono);font-size:12px;color:rgba(255,255,255,0.7)">${p.url}</td>
          <td><span style="display:inline-flex;align-items:center;font-family:var(--mono);font-size:12px;font-weight:500;padding:3px 8px;border-radius:6px;background:${seoBg};color:${seoColor}">${p.seo}/100</span></td>
          <td style="text-align:right;font-family:var(--mono);font-size:12px;color:var(--zinc-500)">${p.visitors}</td>
          <td><span class="pill ${statusPill}" style="font-size:10px">${p.status}</span></td>
          <td style="text-align:right"><button class="btn btn-sm" style="font-size:11px;padding:4px 10px;margin-right:6px">SEO</button><button class="btn btn-sm" style="font-size:11px;padding:4px 10px">Edit</button></td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
  }

  const unread=uc(s);
  const sslLabel=s.sslOk?`${s.sslDays} days`:'Not provisioned';
  const sslColor=s.sslOk?(s.sslDays>30?'var(--accent)':s.sslDays>7?'var(--warn)':'var(--red)'):'var(--warn)';
  const changeColor=s.visitorsChange.startsWith('+')?'var(--accent)':s.visitorsChange==='0%'?'var(--zinc-500)':'var(--red)';

  // Mini sparkline SVG
  const maxV=Math.max(...s.visitorsWeek,1);
  const sparkW=80,sparkH=28;
  const sparkPoints=s.visitorsWeek.map((v,i)=>`${(i/(s.visitorsWeek.length-1))*sparkW},${sparkH-((v/maxV)*sparkH)}`).join(' ');
  const sparkSvg=`<svg width="${sparkW}" height="${sparkH}" viewBox="0 0 ${sparkW} ${sparkH}" style="display:block"><polyline points="${sparkPoints}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  return `<div class="back-link" onclick="go('sites')">${I.arrow} Sites</div>
    <div class="detail-head"><h2>${s.name}</h2><span class="pill pill-green">Live</span><span class="tag">${s.type}</span>
    <span style="font-size:12px;color:var(--zinc-500);margin-left:4px">${s.client}</span>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      ${unread?`<button class="btn btn-sm" onclick="event.stopPropagation();go('inbox-${s.id}')" style="position:relative"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg><span style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#000;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">${unread}</span></button>`:''}
      <button class="btn btn-sm" onclick="document.getElementById('deploys-${s.id}').style.display=document.getElementById('deploys-${s.id}').style.display==='none'?'block':'none'" style="gap:5px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg> ${s.deploys.length} deploys</button>
      <button class="btn-accent btn btn-sm">Deploy now</button>
      <button class="btn btn-sm">Settings</button>
    </div></div>

    <!-- Overview strip -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;margin-bottom:24px">
      <div class="stat">
        <div class="stat-label">Visitors today</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="stat-val">${s.visitorsToday}</div>
          ${sparkSvg}
        </div>
        <div class="stat-note" style="color:${changeColor}">${s.visitorsChange} vs last week</div>
      </div>
      <div class="stat">
        <div class="stat-label">Uptime</div>
        <div class="stat-val">${s.uptime}<span style="font-size:13px;color:var(--zinc-500)">%</span></div>
        <div class="stat-note">${s.downtimeMin?`<span style="color:var(--warn)">${s.downtimeMin}m down</span>`:'No downtime'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">SSL</div>
        <div style="margin-top:4px;margin-bottom:4px">${sslPill}</div>
        <div class="stat-note" style="color:${sslColor}">${sslLabel}</div>
      </div>
      <div class="stat">
        <div class="stat-label">SEO issues</div>
        <div class="stat-val" style="${s.seoIssues.length?'color:var(--orange)':''}">${s.seoIssues.length}</div>
        <div class="stat-note">${s.seoIssues.filter(i=>i.severity==='warn').length} warnings</div>
      </div>
      <div class="stat">
        <div class="stat-label">Errors</div>
        <div class="stat-val" style="${s.errors.length?'color:var(--red)':''}">${s.errors.length}</div>
        <div class="stat-note">${s.errors.length?'Needs attention':'All clear'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Response</div>
        <div class="stat-val">${s.responseAvg}<span style="font-size:13px;color:var(--zinc-500)">ms</span></div>
        <div class="stat-note">P95: ${s.responseP95}ms</div>
      </div>
    </div>

    ${s.errors.length?`<div class="section">
      <div class="section-head"><div class="section-title" style="display:flex;align-items:center;gap:8px;color:var(--red)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Errors</div></div>
      <div style="border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:6px 20px">
        ${s.errors.map(e=>`<div class="issue-item">
          <div class="issue-icon issue-icon-red"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          <div><div class="issue-text">${e.text}</div><div class="issue-meta">${e.time}</div></div>
        </div>`).join('')}
      </div>
    </div>`:''}

    ${s.seoIssues.length?`<div class="section">
      <div class="section-head"><div class="section-title" style="display:flex;align-items:center;gap:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> SEO issues</div></div>
      <div style="border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:6px 20px">
        ${s.seoIssues.map(i=>{
          const pc=i.severity==='warn'?'pill-orange':'pill-blue';const lb=i.severity==='warn'?'Warning':'Info';
          return `<div class="seo-item"><span class="pill ${pc} pill-no-dot" style="font-size:10px">${lb}</span><div style="font-size:13px">${i.issue}</div><span class="tag">${i.page}</span></div>`;
        }).join('')}
      </div>
    </div>`:''}

    <div id="deploys-${s.id}" style="display:none" class="section"><div class="section-head"><div class="section-title">Deploy history</div></div>
    <div class="deploy-list">${deploys}</div></div>
    <div class="section">
      <div class="tab-bar"><button class="tab active">Pages <span class="badge-count">${s.pages}</span></button><button class="tab">Blog posts <span class="badge-count">0</span></button><button class="tab">Templates <span class="badge-count">0</span></button><button class="tab">Files</button></div>
      ${pagesContent}
    </div>`;
}

/* ═══════════════ REMINDERS ═══════════════ */
function vReminders(s){
  const pending=s.reminders.filter(r=>!r.done);const done=s.reminders.filter(r=>r.done);
  function rl(items,isDone){return items.map(r=>`
    <div class="reminder">
      <div class="reminder-check${isDone?' done':''}" onclick="toggleR('${s.id}',${s.reminders.indexOf(r)})"></div>
      <div class="reminder-text${isDone?' done-text':''}">${r.text}</div>
      <div class="reminder-due${r.overdue&&!isDone?' overdue':''}">${r.due}</div>
      ${r.overdue&&!isDone?'<span class="pill pill-red" style="font-size:10px">Overdue</span>':''}
    </div>`).join('');}
  let content='';
  if(pending.length) content+=`<div class="section"><div class="section-title" style="margin-bottom:12px">Pending</div><div class="reminder-list">${rl(pending,false)}</div></div>`;
  if(done.length) content+=`<div class="section"><div class="section-title" style="margin-bottom:12px;color:var(--zinc-500)">Completed</div><div class="reminder-list">${rl(done,true)}</div></div>`;
  if(!s.reminders.length) content=`<div class="empty" style="border:1px solid rgba(255,255,255,0.1);border-radius:12px"><div class="empty-icon">${I.bell}</div>No reminders</div>`;
  return `<div class="back-link" onclick="go('detail-${s.id}')">${I.arrow} ${s.name}</div>
    <div class="page-head"><div><div class="page-title">Reminders</div><div class="page-sub">${s.client} · ${pending.length} pending</div></div>
    <button class="btn btn-sm">+ Add reminder</button></div>${content}`;
}
function toggleR(sid,idx){const s=SITES.find(x=>x.id===sid);s.reminders[idx].done=!s.reminders[idx].done;renderSidebar();renderMain();}

/* ═══════════════ ANALYTICS ═══════════════ */
function vAnalytics(s){
  return `<div class="back-link" onclick="go('detail-${s.id}')">${I.arrow} ${s.name}</div>
    <div class="page-head"><div><div class="page-title">${s.name} — Analytics</div><div class="page-sub">Traffic, uptime, and deployment health</div></div>
    <select style="padding:7px 12px;background:var(--zinc-800);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.7);font-family:'Inter', sans-serif;font-size:12px;cursor:pointer">
      <option>Last 30 days</option><option>Last 7 days</option><option>Last 24 hours</option></select></div>
    <div class="stats stats-3">
      <div class="stat"><div class="stat-label">Visitors</div><div class="stat-val">0</div></div>
      <div class="stat"><div class="stat-label">Pageviews</div><div class="stat-val">0</div></div>
      <div class="stat"><div class="stat-label">Online today</div><div class="stat-val">0</div></div>
    </div>
    <div class="stats stats-3">
      <div class="stat"><div class="stat-label">Uptime</div><div class="stat-val">${s.uptime}<span style="font-size:14px;color:var(--zinc-500)">%</span></div><div class="stat-note"><span class="pill pill-green" style="font-size:10px">Excellent</span></div></div>
      <div class="stat"><div class="stat-label">Avg response</div><div class="stat-val">${s.responseAvg}<span style="font-size:14px;color:var(--zinc-500)">ms</span></div></div>
      <div class="stat"><div class="stat-label">Deploy success</div><div class="stat-val">75<span style="font-size:14px;color:var(--zinc-500)">%</span></div><div class="stat-note">${s.deploys.length} deploys</div></div>
    </div>
    <div class="panels">
      <div class="panel"><div class="panel-title">Traffic trend</div>
        <div class="traffic-placeholder">${[20,35,15,50,40,25,60,45,30,55,20,40,35,15].map(h=>`<div class="traffic-bar" style="height:${h}%"></div>`).join('')}</div>
        <div style="text-align:center;font-size:12px;color:var(--zinc-500);margin-top:12px">No traffic data yet</div></div>
      <div class="panel"><div class="panel-title">Response times</div>
        <div class="speed-grid">
          <div><div class="speed-item-label">Avg response</div><div class="speed-item-val">${s.responseAvg}<span style="font-size:11px;color:var(--zinc-500)">ms</span></div></div>
          <div><div class="speed-item-label">P95 response</div><div class="speed-item-val">${s.responseP95}<span style="font-size:11px;color:var(--zinc-500)">ms</span></div></div>
          <div><div class="speed-item-label">Down events</div><div class="speed-item-val">0</div></div>
          <div><div class="speed-item-label">Uptime</div><div class="speed-item-val">${s.uptime}<span style="font-size:11px;color:var(--zinc-500)">%</span></div></div>
        </div></div>
    </div>`;
}
