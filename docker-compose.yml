services:

  # ── PHP-FPM (Laravel app) ─────────────────────────────────────────────────
  app:
    build:
      context: .
      target: php-deps        # dev: use the deps stage (includes composer, no asset build)
    image: pixelkraft-app:dev
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor  # anonymous volume keeps container vendor intact on bind-mount
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost
      APP_DEBUG: "true"
      DB_CONNECTION: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pixelkraft
      DB_USERNAME: pixelkraft
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      LOG_CHANNEL: stderr
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [pixelkraft]

  # ── Nginx (serves static assets + proxies PHP-FPM) ───────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [pixelkraft]

  # ── Vite dev server (HMR) ─────────────────────────────────────────────────
  vite:
    image: node:20-alpine
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    networks: [pixelkraft]

  # ── Laravel Horizon (queue worker) ───────────────────────────────────────
  horizon:
    build:
      context: .
      target: php-deps
    image: pixelkraft-app:dev
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pixelkraft
      DB_USERNAME: pixelkraft
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      LOG_CHANNEL: stderr
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [pixelkraft]

  # ── Scheduler (artisan schedule:work) ────────────────────────────────────
  scheduler:
    build:
      context: .
      target: php-deps
    image: pixelkraft-app:dev
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pixelkraft
      DB_USERNAME: pixelkraft
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      LOG_CHANNEL: stderr
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [pixelkraft]

  # ── MariaDB ───────────────────────────────────────────────────────────────
  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: pixelkraft
      MARIADB_USER: pixelkraft
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: rootsecret
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 10
      start_period: 10s
    ports:
      - "3307:3306"   # expose on non-standard host port to avoid conflicts
    networks: [pixelkraft]

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    ports:
      - "6380:6379"   # expose on non-standard host port to avoid conflicts
    networks: [pixelkraft]

  # ── Mailpit (catch-all SMTP in dev) ──────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks: [pixelkraft]

volumes:
  db-data:
  redis-data:

networks:
  pixelkraft:
    driver: bridge
