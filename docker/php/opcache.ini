; OPcache — tuned for a containerised Laravel app
; In dev, set opcache.enable=0 or opcache.validate_timestamps=1 in your override.

opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0   ; production: timestamps never change inside an immutable image
opcache.revalidate_freq = 0
opcache.save_comments = 1         ; required by several Laravel features (e.g. model relationships)
opcache.fast_shutdown = 1
