services:

  app:
    build:
      context: .
      target: production
    image: platform-app:prod
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [platform]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - app-storage:/var/www/html/storage:ro
    volumes_from:
      - app:ro
    depends_on: [app]
    networks: [platform]

  worker:
    image: platform-app:prod
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [platform]

  scheduler:
    image: platform-app:prod
    restart: unless-stopped
    command: php artisan schedule:work
    env_file: .env
    volumes:
      - app-storage:/var/www/html/storage
      - app-bootstrap:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [platform]

  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: platform
      MARIADB_USER: platform
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 10
      start_period: 30s
    networks: [platform]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks: [platform]

volumes:
  db-data:
  redis-data:
  app-storage:
  app-bootstrap:

networks:
  platform:
    driver: bridge
