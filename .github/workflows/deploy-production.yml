name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROD_HOST: ${{ secrets.PROD_HOST != '' && secrets.PROD_HOST || vars.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER != '' && secrets.PROD_USER || vars.PROD_USER }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY != '' && secrets.PROD_SSH_KEY || vars.PROD_SSH_KEY }}
      PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD != '' && secrets.PROD_SSH_PASSWORD || vars.PROD_SSH_PASSWORD }}
      PROD_APP_DIR: ${{ secrets.PROD_APP_DIR != '' && secrets.PROD_APP_DIR || vars.PROD_APP_DIR }}
      PROD_PORT: ${{ secrets.PROD_PORT != '' && secrets.PROD_PORT || vars.PROD_PORT || '22' }}
      SSH_KEY_FALLBACK: ${{ secrets.PROD_SSH_PRIVATE_KEY != '' && secrets.PROD_SSH_PRIVATE_KEY || vars.PROD_SSH_PRIVATE_KEY }}
      SSH_PRIVATE_KEY_FALLBACK: ${{ secrets.SSH_PRIVATE_KEY != '' && secrets.SSH_PRIVATE_KEY || vars.SSH_PRIVATE_KEY }}
      SSH_KEY_SHORT_FALLBACK: ${{ secrets.SSH_KEY != '' && secrets.SSH_KEY || vars.SSH_KEY }}
      SSH_PASSWORD_FALLBACK: ${{ secrets.PROD_PASSWORD != '' && secrets.PROD_PASSWORD || vars.PROD_PASSWORD }}
      SSH_PASSWORD_GLOBAL_FALLBACK: ${{ secrets.SSH_PASSWORD != '' && secrets.SSH_PASSWORD || vars.SSH_PASSWORD }}

    steps:
      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          # Prefer explicit PROD_* names, then fall back to common legacy aliases.
          if [ -z "${PROD_SSH_KEY:-}" ] && [ -n "${SSH_KEY_FALLBACK:-}" ]; then
            echo "PROD_SSH_KEY=${SSH_KEY_FALLBACK}" >> "$GITHUB_ENV"
          fi
          if [ -z "${PROD_SSH_KEY:-}" ] && [ -n "${SSH_PRIVATE_KEY_FALLBACK:-}" ]; then
            echo "PROD_SSH_KEY=${SSH_PRIVATE_KEY_FALLBACK}" >> "$GITHUB_ENV"
          fi
          if [ -z "${PROD_SSH_KEY:-}" ] && [ -n "${SSH_KEY_SHORT_FALLBACK:-}" ]; then
            echo "PROD_SSH_KEY=${SSH_KEY_SHORT_FALLBACK}" >> "$GITHUB_ENV"
          fi
          if [ -z "${PROD_SSH_PASSWORD:-}" ] && [ -n "${SSH_PASSWORD_FALLBACK:-}" ]; then
            echo "PROD_SSH_PASSWORD=${SSH_PASSWORD_FALLBACK}" >> "$GITHUB_ENV"
          fi
          if [ -z "${PROD_SSH_PASSWORD:-}" ] && [ -n "${SSH_PASSWORD_GLOBAL_FALLBACK:-}" ]; then
            echo "PROD_SSH_PASSWORD=${SSH_PASSWORD_GLOBAL_FALLBACK}" >> "$GITHUB_ENV"
          fi

          missing=()
          for required in PROD_HOST PROD_USER PROD_APP_DIR; do
            if [ -z "${!required:-}" ]; then
              missing+=("${required}")
            fi
          done

          if [ -z "${PROD_SSH_KEY:-}" ] \
            && [ -z "${SSH_KEY_FALLBACK:-}" ] \
            && [ -z "${SSH_PRIVATE_KEY_FALLBACK:-}" ] \
            && [ -z "${SSH_KEY_SHORT_FALLBACK:-}" ] \
            && [ -z "${PROD_SSH_PASSWORD:-}" ] \
            && [ -z "${SSH_PASSWORD_FALLBACK:-}" ] \
            && [ -z "${SSH_PASSWORD_GLOBAL_FALLBACK:-}" ]; then
            missing+=("PROD_SSH_KEY (or PROD_SSH_PASSWORD)")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing deploy configuration: ${missing[*]}."
            echo "::error::Set these as repository secrets or repository variables before deploying."
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.PROD_HOST }}
          port: ${{ env.PROD_PORT }}
          username: ${{ env.PROD_USER }}
          key: ${{ env.PROD_SSH_KEY }}
          password: ${{ env.PROD_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ env.PROD_APP_DIR }}"

            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd

            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            npm ci
            npm run build

            php artisan optimize:clear
            php artisan horizon:terminate

            if command -v systemctl >/dev/null 2>&1; then
              systemctl reload nginx || true
              systemctl reload php-fpm || true
            fi
