name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve and validate deployment configuration
        id: deploy_config
        shell: bash
        env:
          S_PROD_HOST: ${{ secrets.PROD_HOST }}
          V_PROD_HOST: ${{ vars.PROD_HOST }}
          S_PROD_USER: ${{ secrets.PROD_USER }}
          V_PROD_USER: ${{ vars.PROD_USER }}
          S_PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          V_PROD_APP_DIR: ${{ vars.PROD_APP_DIR }}
          S_PROD_PORT: ${{ secrets.PROD_PORT }}
          V_PROD_PORT: ${{ vars.PROD_PORT }}
          S_PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          V_PROD_SSH_KEY: ${{ vars.PROD_SSH_KEY }}
          S_PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          V_PROD_SSH_PRIVATE_KEY: ${{ vars.PROD_SSH_PRIVATE_KEY }}
          S_SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          V_SSH_PRIVATE_KEY: ${{ vars.SSH_PRIVATE_KEY }}
          S_SSH_KEY: ${{ secrets.SSH_KEY }}
          V_SSH_KEY: ${{ vars.SSH_KEY }}
          S_PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          V_PROD_SSH_PASSWORD: ${{ vars.PROD_SSH_PASSWORD }}
          S_PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          V_PROD_PASSWORD: ${{ vars.PROD_PASSWORD }}
          S_SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          V_SSH_PASSWORD: ${{ vars.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          pick_first_non_empty() {
            for candidate in "$@"; do
              if [ -n "$candidate" ]; then
                printf '%s' "$candidate"
                return 0
              fi
            done
            printf ''
          }

          PROD_HOST="$(pick_first_non_empty "${S_PROD_HOST:-}" "${V_PROD_HOST:-}")"
          PROD_USER="$(pick_first_non_empty "${S_PROD_USER:-}" "${V_PROD_USER:-}")"
          PROD_APP_DIR="$(pick_first_non_empty "${S_PROD_APP_DIR:-}" "${V_PROD_APP_DIR:-}")"
          PROD_PORT="$(pick_first_non_empty "${S_PROD_PORT:-}" "${V_PROD_PORT:-}" "22")"
          PROD_SSH_KEY="$(pick_first_non_empty "${S_PROD_SSH_KEY:-}" "${V_PROD_SSH_KEY:-}" "${S_PROD_SSH_PRIVATE_KEY:-}" "${V_PROD_SSH_PRIVATE_KEY:-}" "${S_SSH_PRIVATE_KEY:-}" "${V_SSH_PRIVATE_KEY:-}" "${S_SSH_KEY:-}" "${V_SSH_KEY:-}")"
          PROD_SSH_PASSWORD="$(pick_first_non_empty "${S_PROD_SSH_PASSWORD:-}" "${V_PROD_SSH_PASSWORD:-}" "${S_PROD_PASSWORD:-}" "${V_PROD_PASSWORD:-}" "${S_SSH_PASSWORD:-}" "${V_SSH_PASSWORD:-}")"

          missing=()
          for required in PROD_HOST PROD_USER PROD_APP_DIR; do
            if [ -z "${!required:-}" ]; then
              missing+=("${required}")
            fi
          done

          if [ -z "${PROD_SSH_KEY:-}" ] && [ -z "${PROD_SSH_PASSWORD:-}" ]; then
            missing+=("PROD_SSH_KEY (or PROD_SSH_PASSWORD)")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Missing deploy configuration: ${missing[*]}."
            echo "::warning::Set these as repository secrets or repository variables to enable deployment."
            {
              echo "deploy_enabled=false"
              echo "missing_config=${missing[*]}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "deploy_enabled=true"
            echo "prod_host=$PROD_HOST"
            echo "prod_user=$PROD_USER"
            echo "prod_app_dir=$PROD_APP_DIR"
            echo "prod_port=$PROD_PORT"
            echo "prod_ssh_password=$PROD_SSH_PASSWORD"
            echo "prod_ssh_key<<EOF"
            echo "$PROD_SSH_KEY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        if: ${{ steps.deploy_config.outputs.deploy_enabled == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.deploy_config.outputs.prod_host }}
          port: ${{ steps.deploy_config.outputs.prod_port }}
          username: ${{ steps.deploy_config.outputs.prod_user }}
          key: ${{ steps.deploy_config.outputs.prod_ssh_key }}
          password: ${{ steps.deploy_config.outputs.prod_ssh_password }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ steps.deploy_config.outputs.prod_app_dir }}"

            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd

            composer install --no-dev --optimize-autoloader
            npm ci
            npm run build

            php artisan app:deploy

            if command -v systemctl >/dev/null 2>&1; then
              systemctl reload nginx || true
              systemctl reload php-fpm || true
            fi

      - name: Skip deployment (missing configuration)
        if: ${{ steps.deploy_config.outputs.deploy_enabled != 'true' }}
        run: |
          echo "Production deployment skipped."
          echo "Missing configuration: ${{ steps.deploy_config.outputs.missing_config }}"
